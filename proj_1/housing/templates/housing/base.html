<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>NT Housing Maintenance System</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0 }

        .brand { font-size:18px; font-weight:600 }
        .nav { display:flex; gap:12px; align-items:center }
        .nav-left { display:flex; gap:12px; align-items:center }
        .nav a { color:#fff; text-decoration:none; padding:6px 8px }
        .nav-right { margin-left:24px }
        .header-inner { display:flex; align-items:center; justify-content:space-between; width:100% }
        .container { max-width:900px; margin:40px auto; padding:0 20px }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
                <div class="brand">NT Housing Maintenance System</div>
                <nav class="nav-right nav" style="margin-left:auto;">
                    <a href="{% url 'home' %}">Home</a>
                    <a href="{% url 'register' %}">Register</a>
                    <a href="{% url 'faq' %}">FAQ</a>
                    <a href="{% url 'about' %}">About</a>
                </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
